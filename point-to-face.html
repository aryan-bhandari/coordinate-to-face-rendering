        let angleY = 0;

        function drawMesh() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background grid lines for a "Matrix" feel
            ctx.strokeStyle = "rgba(0, 242, 255, 0.05)";
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(600,i); ctx.stroke();
            }

            // 📐 Rotation & Translation logic
            angleY += 0.01;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = 500;

            const projectedPoints = face_mesh.map(p => {
                // Shift face to center before rotating
                const x = p.x - 0.5;
                const y = p.y - 0.6; // Adjust vertical centering
                const z = p.z;

                // Rotation Matrix (around Y axis)
                const rotX = x * Math.cos(angleY) + z * Math.sin(angleY);
                const rotZ = z * Math.cos(angleY) - x * Math.sin(angleY);

                return {
                    x: rotX * scale + centerX,
                    y: y * scale + centerY,
                    z: rotZ
                };
            });

            // 1. Draw Mesh Connections (Lines)
            ctx.strokeStyle = "rgba(0, 242, 255, 0.15)";
            ctx.lineWidth = 0.5;
            for(let i=0; i<projectedPoints.length - 1; i++) {
                // Avoid connecting distant points across the array for a cleaner look
                if(i % 15 === 0) continue; 
                
                ctx.beginPath();
                ctx.moveTo(projectedPoints[i].x, projectedPoints[i].y);
                ctx.lineTo(projectedPoints[i+1].x, projectedPoints[i+1].y);
                ctx.stroke();
            }

            // 2. Draw Points (Glow)
            projectedPoints.forEach(p => {
                // Points closer to the screen look bigger and brighter
                const pointSize = (p.z + 0.1) * 20; 
                const alpha = Math.max(0.2, (p.z + 0.1) * 10);
                
                ctx.fillStyle = `rgba(0, 242, 255, ${alpha})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#00f2ff";
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.abs(pointSize), 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(drawMesh);
        }
